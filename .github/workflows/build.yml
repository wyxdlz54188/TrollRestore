name: Build TrollRestore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging readchar inquirer3
    
    - name: Build executable
      run: |
        pyinstaller --onefile `
          --name "TrollRestore-Windows-x64.exe" `
          --console `
          --hidden-import pymobiledevice3 `
          --hidden-import pymobiledevice3.cli `
          --hidden-import pymobiledevice3.cli.cli_common `
          --hidden-import pymobiledevice3.lockdown `
          --hidden-import pymobiledevice3.services `
          --hidden-import pymobiledevice3.services.diagnostics `
          --hidden-import pymobiledevice3.services.installation_proxy `
          --hidden-import sparserestore `
          --hidden-import sparserestore.backup `
          --hidden-import sparserestore.perform_restore `
          --hidden-import bpylist2 `
          --hidden-import rich `
          --hidden-import click `
          --hidden-import requests `
          --hidden-import packaging `
          --hidden-import readchar `
          --hidden-import inquirer3 `
          --collect-all pymobiledevice3 `
          --collect-all sparserestore `
          --collect-all readchar `
          --collect-all inquirer3 `
          --copy-metadata readchar `
          --copy-metadata inquirer3 `
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x64
        path: dist/TrollRestore-Windows-x64.exe

  build-windows-32:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging readchar inquirer3
    
    - name: Build executable
      run: |
        pyinstaller --onefile `
          --name "TrollRestore-Windows-x86.exe" `
          --console `
          --hidden-import pymobiledevice3 `
          --hidden-import sparserestore `
          --hidden-import readchar `
          --collect-all pymobiledevice3 `
          --collect-all sparserestore `
          --collect-all readchar `
          --copy-metadata readchar `
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x86
        path: dist/TrollRestore-Windows-x86.exe

  build-macos-intel:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: brew install libusb
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging readchar inquirer3
    
    - name: Build executable
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-macOS-Intel" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --hidden-import readchar \
          --collect-all pymobiledevice3 \
          --collect-all sparserestore \
          --collect-all readchar \
          --copy-metadata readchar \
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-macOS-Intel
        path: dist/TrollRestore-macOS-Intel

  build-macos-arm:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: brew install libusb
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging readchar inquirer3
    
    - name: Build executable
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-macOS-ARM64" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --hidden-import readchar \
          --collect-all pymobiledevice3 \
          --collect-all sparserestore \
          --collect-all readchar \
          --copy-metadata readchar \
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-macOS-ARM64
        path: dist/TrollRestore-macOS-ARM64

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging
    
    - name: Create patch script for readchar
      run: |
        cat > patch_metadata.py << 'EOF'
        import sys
        import importlib.metadata
        
        # 修复 readchar 包元数据问题
        try:
            importlib.metadata.version('readchar')
        except importlib.metadata.PackageNotFoundError:
            # 手动创建 readchar 的元数据
            from importlib.metadata import Distribution
        
            class FakeDistribution(Distribution):
                def __init__(self):
                    self._metadata = {'Version': '4.0.0', 'Name': 'readchar'}
                
                @property
                def metadata(self):
                    return self._metadata
                
                def read_text(self, filename):
                    return None
                
                def locate_file(self, path):
                    return path
            
            # 注册假的 distribution
            if not hasattr(importlib.metadata, '_distributions'):
                importlib.metadata._distributions = {}
            importlib.metadata._distributions['readchar'] = FakeDistribution()
        EOF
    
    - name: Build with patch
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-Linux-x86_64" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --runtime-hook patch_metadata.py \
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Linux-x86_64
        path: dist/TrollRestore-Linux-x86_64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'arm64'
    
    - name: Install libusb
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging
    
    - name: Create patch script for readchar
      run: |
        cat > patch_metadata.py << 'EOF'
        import sys
        import importlib.metadata
        
        # 修复 readchar 包元数据问题
        try:
            importlib.metadata.version('readchar')
        except importlib.metadata.PackageNotFoundError:
            # 手动创建 readchar 的元数据
            from importlib.metadata import Distribution
        
            class FakeDistribution(Distribution):
                def __init__(self):
                    self._metadata = {'Version': '4.0.0', 'Name': 'readchar'}
                
                @property
                def metadata(self):
                    return self._metadata
                
                def read_text(self, filename):
                    return None
                
                def locate_file(self, path):
                    return path
            
            # 注册假的 distribution
            if not hasattr(importlib.metadata, '_distributions'):
                importlib.metadata._distributions = {}
            importlib.metadata._distributions['readchar'] = FakeDistribution()
        EOF
    
    - name: Build with patch
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-Linux-ARM64" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --runtime-hook patch_metadata.py \
          trollstore.py
    
    - name: Verify build
      run: |
        file dist/TrollRestore-Linux-ARM64
        ldd dist/TrollRestore-Linux-ARM64 || true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Linux-ARM64
        path: dist/TrollRestore-Linux-ARM64
