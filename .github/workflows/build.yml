name: Build TrollRestore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        copy dist\TrollRestore.exe dist\TrollRestore-Windows-x64.exe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x64
        path: dist/TrollRestore-Windows-x64.exe

  build-windows-32:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build 32-bit with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        copy dist\TrollRestore.exe dist\TrollRestore-Windows-x86.exe
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x86
        path: dist/TrollRestore-Windows-x86.exe

  build-macos-intel:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: brew install libusb
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        mv dist/TrollRestore dist/TrollRestore-macOS-Intel
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-macOS-Intel
        path: dist/TrollRestore-macOS-Intel

  build-macos-arm:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: brew install libusb
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        mv dist/TrollRestore dist/TrollRestore-macOS-ARM64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-macOS-ARM64
        path: dist/TrollRestore-macOS-ARM64

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        mv dist/TrollRestore dist/TrollRestore-Linux-x86_64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Linux-x86_64
        path: dist/TrollRestore-Linux-x86_64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'arm64'
    
    - name: Install libusb
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with spec file
      run: |
        pyinstaller TrollRestore.spec --clean --noconfirm
        mv dist/TrollRestore dist/TrollRestore-Linux-ARM64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Linux-ARM64
        path: dist/TrollRestore-Linux-ARM64
