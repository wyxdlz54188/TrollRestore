name: Build TrollRestore

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Install packages (skip problematic ones)
      run: |
        pip install bpylist2 rich click requests packaging
        pip install pymobiledevice3 --no-deps
        pip install construct construct-typing asn1 coloredlogs pygments hexdump daemonize gpxpy
        pip install pykdebugparser pyusb tqdm xonsh parameter_decorators pygnuutils
        pip install cryptography pycrashreport fastapi uvicorn wsproto Pillow inquirer3
        pip install ipsw_parser ifaddr hyperframe srptools qh3 developer_disk_image
        pip install opack2 psutil prompt_toolkit python-pcapng plumbum pyimg4
        pip install typer typer-injector defusedxml
    
    - name: Build executable
      run: |
        pyinstaller --onefile `
          --name "TrollRestore-Windows-x64.exe" `
          --console `
          --hidden-import pymobiledevice3 `
          --hidden-import sparserestore `
          --collect-all pymobiledevice3 `
          --collect-all sparserestore `
          trollstore.py
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x64
        path: dist/TrollRestore-Windows-x64.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: brew install libusb
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-macOS" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --collect-all pymobiledevice3 \
          --collect-all sparserestore \
          trollstore.py
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-macOS
        path: dist/TrollRestore-macOS

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install libusb
      run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-Linux" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import sparserestore \
          --collect-all pymobiledevice3 \
          --collect-all sparserestore \
          trollstore.py
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Linux
        path: dist/TrollRestore-Linux
