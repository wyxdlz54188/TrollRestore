name: Build TrollRestore

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build for macOS'
        type: boolean
        default: true
      build_windows:
        description: 'Build for Windows'
        type: boolean
        default: true
      build_linux:
        description: 'Build for Linux'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: macOS
            arch: x86_64
            suffix: ''
          - os: macos-14
            platform: macOS
            arch: arm64
            suffix: ''
          - os: windows-latest
            platform: Windows
            arch: x86_64
            suffix: '.exe'
          - os: ubuntu-latest
            platform: Linux
            arch: x86_64
            suffix: ''
    
    runs-on: ${{ matrix.os }}
    if: |
      (matrix.platform == 'macOS' && github.event.inputs.build_macos != 'false') ||
      (matrix.platform == 'Windows' && github.event.inputs.build_windows != 'false') ||
      (matrix.platform == 'Linux' && github.event.inputs.build_linux != 'false') ||
      github.event_name != 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libusb
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-${{ matrix.platform }}-${{ matrix.arch }}" \
          --console \
          --hidden-import zeroconf \
          --hidden-import zeroconf._utils.ipaddress \
          --hidden-import zeroconf._handlers.answers \
          --hidden-import pymobiledevice3 \
          --hidden-import pymobiledevice3.cli \
          --hidden-import pymobiledevice3.cli.cli_common \
          --hidden-import pymobiledevice3.lockdown \
          --hidden-import pymobiledevice3.services \
          --hidden-import pymobiledevice3.services.diagnostics \
          --hidden-import pymobiledevice3.services.installation_proxy \
          --hidden-import sparserestore \
          --hidden-import sparserestore.backup \
          --hidden-import sparserestore.perform_restore \
          --hidden-import bpylist2 \
          --hidden-import rich \
          --hidden-import rich.console \
          --hidden-import rich.progress \
          --hidden-import click \
          --hidden-import requests \
          --hidden-import packaging \
          --hidden-import packaging.version \
          --hidden-import packaging.specifiers \
          --hidden-import packaging.requirements \
          --collect-all pymobiledevice3 \
          --collect-all sparserestore \
          trollstore.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-${{ matrix.platform }}-${{ matrix.arch }}
        path: dist/TrollRestore-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.suffix }}
        compression-level: 0
        if-no-files-found: error

  build-windows-32bit:
    runs-on: windows-latest
    if: |
      (github.event.inputs.build_windows != 'false' || github.event_name != 'workflow_dispatch') &&
      github.event_name != 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python (32-bit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pymobiledevice3 bpylist2 rich click requests packaging
    
    - name: Build 32-bit executable
      run: |
        pyinstaller --onefile \
          --name "TrollRestore-Windows-x86" \
          --console \
          --hidden-import pymobiledevice3 \
          --hidden-import bpylist2 \
          --hidden-import rich \
          --hidden-import click \
          --hidden-import requests \
          --hidden-import packaging \
          trollstore.py
    
    - name: Upload 32-bit artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestore-Windows-x86
        path: dist/TrollRestore-Windows-x86.exe
        compression-level: 0
